<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අස්වනු නෙලීම් - POS V5</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 10px; border-bottom: 1px solid #ddd; background: #eee; }
        .search-box input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 20px; text-indent: 10px; outline: none; }
        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .customer-item:hover { background: #f1f8e9; }
        .customer-item.active { background: #e8f5e9; border-left: 6px solid var(--primary); font-weight: bold; }
        
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .edit-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary); color: white; }
        .btn-print { background: #444; color: white; }
        .btn-edit { background: #ffa000; color: white; font-size: 0.7rem; margin-right: 5px; }
        .btn-del { background: #d32f2f; color: white; font-size: 0.7rem; }

        /* Receipt Styles */
        .receipt-container { width: 400px; margin: auto; padding: 15px; border: 1px solid #eee; background: white; position: relative; }
        .header-center { text-align: center; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; font-size: 9pt; }
        th { text-align: left; border-bottom: 1px solid #000; padding: 5px 0; }
        td { padding: 8px 0; border-bottom: 1px dotted #ccc; vertical-align: top; }

        @media print {
            @page { size: 80mm auto; margin: 0; }
            body { background: white; width: 80mm; }
            .sidebar, .edit-section, .btn, .print-hide, .action-btns { display: none !important; }
            .main-content { padding: 0; width: 80mm; }
            .receipt-container { width: 72mm; border: none; padding: 2mm; margin: 0; }
            h1 { font-size: 18pt !important; }
            .sig-section { display: block !important; text-align: center; margin-top: 30px; }
            .sig-line { border-top: 1px solid #000; width: 140px; margin: 30px auto 5px; }
        }
        .sig-section { display: none; }
    </style>
</head>
<body>

<div class="sidebar print-hide">
    <div class="sidebar-header">
        <span>පාරිභෝගිකයින්</span>
        <button onclick="addNewCustomer()" style="background:white; color:green; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight:bold;">+</button>
    </div>
    <div class="search-box">
        <input type="text" id="searchBar" placeholder="නම සොයන්න (Search)..." onkeyup="filterCustomers()">
    </div>
    <div class="customer-list" id="custList"></div>
</div>

<div class="main-content">
    <div id="welcome" style="text-align:center; margin-top:50px; color:#999;">
        <h2>පාරිභෝගිකයෙකු තෝරාගන්න.</h2>
    </div>

    <div id="appBody" style="display:none;">
        <div class="edit-section print-hide">
            <h3 style="margin-top:0; color:var(--primary);">දත්ත ඇතුළත් කිරීම / වෙනස් කිරීම</h3>
            <div class="grid-3">
                <div><label>නම</label><input type="text" id="c_name"></div>
                <div><label>දුරකථන</label><input type="text" id="c_phone"></div>
                <div><label>ලිපිනය</label><input type="text" id="c_city"></div>
            </div>
            <div class="grid-3">
                <div><label>දිනය</label><input type="date" id="n_date"></div>
                <div><label>අක්කර</label><input type="number" id="n_acres" step="0.1"></div>
                <div><label>අක්කරයක මිල</label><input type="number" id="n_rate"></div>
            </div>
            <div class="grid-3">
                <div><label>ටෙරල් ගණන</label><input type="number" id="n_trailers"></div>
                <div><label>ටෙරල් මිල</label><input type="number" id="n_tprice"></div>
                <div><label>ගෙවූ මුදල්</label><input type="number" id="n_paid"></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-save" onclick="saveCustomerProfile()">Save Profile</button>
                <button class="btn" id="addUpdateBtn" onclick="addOrUpdateEntry()" style="background:#0277bd; color:white;">+ Add/Update Entry</button>
                <button class="btn btn-print" onclick="window.print()">Print Receipt</button>
            </div>
        </div>

        <div class="receipt-container">
            <div class="header-center">
                <h1 style="margin:0;">අස්වනු නෙලීම්</h1>
                <p style="margin:2px 0; font-size:10pt;">L.B.4 හිගුරක්දමන, හිගුරක්ගොඩ</p>
                <p style="margin:2px 0; font-size:10pt;">දුරකථන: 077-2843713</p>
                <div class="divider"></div>
                <p id="disp_date" style="font-weight:bold; font-size:9pt;"></p>
            </div>

            <div style="font-size:9pt; margin-bottom:5px;">
                <strong>පාරිභෝගිකයා:</strong> <span id="disp_name"></span><br>
                <strong>ලිපිනය:</strong> <span id="disp_city"></span>
            </div>
            <div class="divider"></div>

            <table>
                <thead>
                    <tr>
                        <th>විස්තරය (Details)</th>
                        <th style="text-align:right;">මුදල</th>
                        <th class="print-hide" style="text-align:right; width:60px;">ක්‍රියා</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="divider"></div>
            <div style="display:flex; justify-content:space-between; font-size:12pt; font-weight:bold;">
                <span>මුළු හිඟය:</span>
                <span id="grandTotal">0.00</span>
            </div>
            <div class="divider"></div>

            <div class="sig-section">
                <p style="font-size:8pt;">ස්තූතියි! නැවත එන්න.</p>
                <div class="sig-line"></div>
                <p style="font-size:8pt;">Authorized Signature</p>
            </div>
        </div>
    </div>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('Harvest_Pro_V5')) || [];
    let activeId = null;
    let editIndex = -1; // -1 means adding new, otherwise editing existing

    function renderList() {
        const list = document.getElementById('custList');
        list.innerHTML = '';
        customers.forEach(c => {
            const div = document.createElement('div');
            div.className = `customer-item ${activeId === c.id ? 'active' : ''}`;
            div.innerHTML = `<div>${c.name}</div><small style="color:#777">${c.city || ''}</small>`;
            div.onclick = () => loadCustomer(c.id);
            list.appendChild(div);
        });
    }

    function filterCustomers() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        const items = document.querySelectorAll('.customer-item');
        items.forEach(item => {
            const name = item.innerText.toLowerCase();
            item.style.display = name.includes(term) ? 'block' : 'none';
        });
    }

    function addNewCustomer() {
        const newId = Date.now();
        customers.unshift({ id: newId, name: "නව පාරිභෝගිකයා", phone: "", city: "", history: [] });
        loadCustomer(newId);
    }

    function loadCustomer(id) {
        activeId = id;
        editIndex = -1;
        const c = customers.find(cust => cust.id === id);
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('appBody').style.display = 'block';
        document.getElementById('disp_date').innerText = "දිනය: " + new Date().toLocaleDateString();
        
        document.getElementById('c_name').value = c.name;
        document.getElementById('c_phone').value = c.phone;
        document.getElementById('c_city').value = c.city;
        
        updateDisplay();
        renderTable();
        renderList();
    }

    function renderTable() {
        const c = customers.find(cust => cust.id === activeId);
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        let totalDue = 0;

        c.history.forEach((h, idx) => {
            let hTotal = (h.acres || 0) * (h.rate || 0);
            let tTotal = (h.trailers || 0) * (h.tprice || 0);
            let dayTotal = hTotal + tTotal;
            let dayDue = dayTotal - (h.paid || 0);
            totalDue += dayDue;

            body.innerHTML += `
                <tr>
                    <td>
                        <strong>${h.date}</strong><br>
                        ${h.acres} ac x ${h.rate} / ${h.trailers} T x ${h.tprice}
                    </td>
                    <td style="text-align:right; vertical-align:bottom;">
                        ${dayTotal.toLocaleString()}<br>
                        <small style="color:red;">Due: ${dayDue.toLocaleString()}</small>
                    </td>
                    <td class="print-hide action-btns" style="text-align:right;">
                        <button class="btn-edit" onclick="editRow(${idx})">✎</button>
                        <button class="btn-del" onclick="deleteRow(${idx})">×</button>
                    </td>
                </tr>`;
        });
        document.getElementById('grandTotal').innerText = "Rs. " + totalDue.toLocaleString();
    }

    function addOrUpdateEntry() {
        const h = {
            date: document.getElementById('n_date').value,
            acres: parseFloat(document.getElementById('n_acres').value) || 0,
            rate: parseFloat(document.getElementById('n_rate').value) || 0,
            trailers: parseFloat(document.getElementById('n_trailers').value) || 0,
            tprice: parseFloat(document.getElementById('n_tprice').value) || 0,
            paid: parseFloat(document.getElementById('n_paid').value) || 0
        };
        if(!h.date) return alert("දිනය ඇතුළත් කරන්න.");
        
        const c = customers.find(cust => cust.id === activeId);
        if(editIndex === -1) {
            c.history.push(h);
        } else {
            c.history[editIndex] = h;
            editIndex = -1;
            document.getElementById('addUpdateBtn').innerText = "+ Add Entry";
            document.getElementById('addUpdateBtn').style.background = "#0277bd";
        }
        
        // Clear Entry
        ['n_date','n_acres','n_rate','n_trailers','n_tprice','n_paid'].forEach(id => document.getElementById(id).value = '');
        renderTable();
        saveToStorage();
    }

    function editRow(idx) {
        const h = customers.find(c => c.id === activeId).history[idx];
        document.getElementById('n_date').value = h.date;
        document.getElementById('n_acres').value = h.acres;
        document.getElementById('n_rate').value = h.rate;
        document.getElementById('n_trailers').value = h.trailers;
        document.getElementById('n_tprice').value = h.tprice;
        document.getElementById('n_paid').value
