<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අස්වනු නෙලීම් - Master POS</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #0d47a1; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: #333; }
        
        /* Sidebar Styles */
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 10px; border-bottom: 1px solid #ddd; background: #fafafa; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; box-sizing: border-box; }
        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .customer-item:hover { background: #f1f8e9; }
        .customer-item.active { background: #e8f5e9; border-left: 6px solid var(--primary); font-weight: bold; }
        
        /* Main Workspace */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; background: white; }
        .edit-section { background: #fdfdfd; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { font-size: 0.75rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 0.9rem; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; flex: 1; text-align: center; }
        .btn-save { background: var(--primary); color: white; }
        .btn-add { background: var(--secondary); color: white; }
        .btn-print { background: #333; color: white; }
        
        .action-btn { border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; font-size: 0.8rem; margin: 0 2px; color: white; }
        .edit-row-btn { background: #ffa000; }
        .del-row-btn { background: #d32f2f; }

        /* Receipt Container (80mm) */
        .receipt-container { width: 380px; margin: auto; padding: 15px; border: 1px solid #eee; background: white; }
        .header-center { text-align: center; margin-bottom: 15px; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; font-size: 9.5pt; }
        th { text-align: left; border-bottom: 1px solid #000; padding: 5px 0; }
        td { padding: 8px 0; border-bottom: 1px dotted #ccc; vertical-align: top; }

        /* PRINT SETTINGS FOR 80MM PRINTER */
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body { background: white; width: 80mm; display: block; height: auto; }
            .sidebar, .edit-section, .print-hide { display: none !important; }
            .main-content { padding: 0; width: 80mm; overflow: visible; }
            .receipt-container { width: 72mm; border: none; padding: 2mm; margin: 0; box-shadow: none; }
            h1 { font-size: 18pt !important; margin: 5px 0; }
            .divider { border-top: 1px dashed #000; }
            .sig-section { display: block !important; text-align: center; margin-top: 35px; }
            .sig-line { border-top: 1px solid #000; width: 140px; margin: 35px auto 5px; }
            td, th { font-size: 9pt !important; }
        }
        .sig-section { display: none; }
    </style>
</head>
<body>

<div class="sidebar print-hide">
    <div class="sidebar-header">
        <span style="font-size: 1.2rem; font-weight: bold;">පාරිභෝගිකයින්</span>
        <button onclick="addNewCustomer()" style="background:white; color:green; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-weight:bold; font-size:1.2rem;">+</button>
    </div>
    <div class="search-box">
        <input type="text" id="searchBar" placeholder="නම සොයන්න (Search)..." onkeyup="filterCustomers()">
    </div>
    <div class="customer-list" id="custList"></div>
</div>

<div class="main-content">
    <div id="welcome" style="text-align:center; margin-top:100px; color:#999;">
        <h2>පාරිභෝගිකයෙකු තෝරාගන්න.</h2>
    </div>

    <div id="appBody" style="display:none;">
        <div class="edit-section print-hide">
            <h3 style="margin-top:0; color:var(--primary); border-bottom:1px solid #eee; padding-bottom:10px;">පාරිභෝගික දත්ත සහ ගනුදෙනු</h3>
            <div class="grid-3">
                <div><label>නම (Customer Name)</label><input type="text" id="c_name"></div>
                <div><label>දුරකථන (Phone)</label><input type="text" id="c_phone"></div>
                <div><label>ලිපිනය (Address)</label><input type="text" id="c_city"></div>
            </div>
            <div class="grid-3">
                <div><label>දිනය (Date)</label><input type="date" id="n_date"></div>
                <div><label>අක්කර (Acres)</label><input type="number" id="n_acres" step="0.01" placeholder="0.00"></div>
                <div><label>අක්කරයක මිල (Rate)</label><input type="number" id="n_rate" placeholder="0"></div>
            </div>
            <div class="grid-3">
                <div><label>ටෙරල් ගණන (Trailers)</label><input type="number" id="n_trailers" placeholder="0"></div>
                <div><label>ටෙරල් මිල (T.Price)</label><input type="number" id="n_tprice" placeholder="0"></div>
                <div><label>ගෙවූ මුදල් (Paid)</label><input type="number" id="n_paid" placeholder="0"></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-save" onclick="saveCustomerProfile()">පාරිභෝගිකයා සුරකින්න</button>
                <button class="btn btn-add" id="addUpdateBtn" onclick="addOrUpdateEntry()">+ දත්ත ඇතුළත් කරන්න</button>
                <button class="btn btn-print" onclick="window.print()">Print Receipt</button>
            </div>
        </div>

        <div class="receipt-container">
            <div class="header-center">
                <h1 style="margin:0; font-size: 22pt;">අස්වනු නෙලීම්</h1>
                <p style="margin:4px 0; font-size:10pt;">L.B.4 හිගුරක්දමන, හිගුරක්ගොඩ</p>
                <p style="margin:4px 0; font-size:10pt;">දුරකථන: 077-2843713</p>
                <div class="divider"></div>
                <p id="disp_date" style="font-weight:bold; font-size:9pt;"></p>
            </div>

            <div style="font-size:10pt; line-height: 1.4;">
                <strong>පාරිභෝගිකයා:</strong> <span id="disp_name"></span><br>
                <strong>ලිපිනය:</strong> <span id="disp_city"></span><br>
                <strong>දුරකථන:</strong> <span id="disp_phone"></span>
            </div>
            <div class="divider"></div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 70%;">විස්තරය (Details)</th>
                        <th style="text-align:right;">මුදල</th>
                        <th class="print-hide" style="text-align:right;">-</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="divider"></div>
            <div style="display:flex; justify-content:space-between; font-size:13pt; font-weight:bold;">
                <span>මුළු හිඟය (Due):</span>
                <span id="grandTotal">0.00</span>
            </div>
            <div class="divider"></div>

            <div class="sig-section">
                <p style="font-size:9pt;">ස්තූතියි! නැවත එන්න.</p>
                <div class="sig-line"></div>
                <p style="font-size:9pt;">අනුමත කළේ (Authorized)</p>
            </div>
        </div>
    </div>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('Harvest_Master_DB')) || [];
    let activeId = null;
    let editIndex = -1;

    function renderList() {
        const list = document.getElementById('custList');
        list.innerHTML = '';
        customers.forEach(c => {
            const div = document.createElement('div');
            div.className = `customer-item ${activeId === c.id ? 'active' : ''}`;
            div.innerHTML = `<div>${c.name}</div><small style="color:#777">${c.city || ''}</small>`;
            div.onclick = () => loadCustomer(c.id);
            list.appendChild(div);
        });
    }

    function filterCustomers() {
        const term = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.customer-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    function addNewCustomer() {
        const newId = Date.now();
        customers.unshift({ id: newId, name: "නව පාරිභෝගිකයා", phone: "", city: "", history: [] });
        loadCustomer(newId);
    }

    function loadCustomer(id) {
        activeId = id;
        editIndex = -1;
        const c = customers.find(cust => cust.id === id);
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('appBody').style.display = 'block';
        document.getElementById('disp_date').innerText = "මුද්‍රිත දිනය: " + new Date().toLocaleDateString();
        
        document.getElementById('c_name').value = c.name;
        document.getElementById('c_phone').value = c.phone;
        document.getElementById('c_city').value = c.city;
        
        refreshDisplay();
    }

    function refreshDisplay() {
        const c = customers.find(cust => cust.id === activeId);
        document.getElementById('disp_name').innerText = c.name;
        document.getElementById('disp_phone').innerText = c.phone;
        document.getElementById('disp_city').innerText = c.city;
        renderTable();
        renderList();
    }

    function renderTable() {
        const c = customers.find(cust => cust.id === activeId);
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        let totalDue = 0;

        c.history.forEach((h, idx) => {
            let hTotal = (h.acres || 0) * (h.rate || 0);
            let tTotal = (h.trailers || 0) * (h.tprice || 0);
            let dayTotal = hTotal + tTotal;
            let dayDue = dayTotal - (h.paid || 0);
            totalDue += dayDue;

            body.innerHTML += `
                <tr>
                    <td>
                        <strong>${h.date}</strong><br>
                        අක්කර: ${h.acres} x ${h.rate}<br>
                        ටෙරල්: ${h.trailers} x ${h.tprice}<br>
                        ගෙවා ඇත: ${h.paid.toLocaleString()}
                    </td>
                    <td style="text-align:right; vertical-align:bottom; font-weight:bold;">
                        ${dayTotal.toLocaleString()}<br>
                        <small style="color:red;">Due: ${dayDue.toLocaleString()}</small>
                    </td>
                    <td class="print-hide" style="text-align:right; vertical-align:bottom;">
                        <button class="action-btn edit-row-btn" onclick="editRow(${idx})">✎</button>
                        <button class="action-btn del-row-btn" onclick="deleteRow(${idx})">×</button>
                    </td>
                </tr>`;
        });
        document.getElementById('grandTotal').innerText = "Rs. " + totalDue.toLocaleString();
    }

    function addOrUpdateEntry() {
        const h = {
            date: document.getElementById('n_date').value,
            acres: parseFloat(document.getElementById('n_acres').value) || 0,
            rate: parseFloat(document.getElementById('n_rate').value) || 0,
            trailers: parseFloat(document.getElementById('n_trailers').value) || 0,
            tprice: parseFloat(document.getElementById('n_tprice').value) || 0,
            paid: parseFloat(document.getElementById('n_paid').value) || 0
        };
        if(!h.date) return alert("කරුණාකර දිනය ඇතුළත් කරන්න.");
        
        const c = customers.find(cust => cust.id === activeId);
        if(editIndex === -1) {
            c.history.push(h);
        } else {
            c.history[editIndex] = h;
            editIndex = -1;
            document.getElementById('addUpdateBtn').innerText = "+ දත්ත ඇතුළත් කරන්න";
            document.getElementById('addUpdateBtn').style.background = "#0d47a1";
        }
        
        ['n_date','n_acres','n_rate','n_trailers','n_tprice','n_paid'].forEach(id => document.getElementById(id).value = '');
        saveAndRefresh();
    }

    function editRow(idx) {
        const h = customers.find(c => c.id === activeId).history[idx];
        document.getElementById('n_date').value = h.date;
        document.getElementById('n_acres').value = h.acres;
        document.getElementById('n_rate').value = h.rate;
        document.getElementById('n_trailers').value = h.trailers;
        document.getElementById('n_tprice').value = h.tprice;
        document.getElementById('n_paid').value = h.paid;
        
        editIndex = idx;
        document.getElementById('addUpdateBtn').innerText = "වෙනස්කම් සුරකින්න (Update Row)";
        document.getElementById('addUpdateBtn').style.background = "#ffa000";
        window.scrollTo(0,0);
    }

    function deleteRow(idx) {
        if(confirm("මෙම ගනුදෙනුව මකා දැමීමට අවශ්‍යද?")) {
            customers.find(c => c.id === activeId).history.splice(idx, 1);
            saveAndRefresh();
        }
    }

    function saveCustomerProfile() {
        const c = customers.find(cust => cust.id === activeId);
        c.name = document.getElementById('c_name').value;
        c.phone = document.getElementById('c_phone').value;
        c.city = document.getElementById('c_city').value;
        saveAndRefresh();
        alert("පාරිභෝගික දත්ත සාර්ථකව සුරැකිණි!");
    }

    function saveAndRefresh() {
        localStorage.setItem('Harvest_Master_DB', JSON.stringify(customers));
        refreshDisplay();
    }

    renderList();
</script>

</body>
    </html>
