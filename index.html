<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>අස්වනු නෙලීම් - POS V6</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #0d47a1; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .search-area { padding: 10px; border-bottom: 1px solid #eee; }
        .search-area input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .customer-list { flex: 1; overflow-y: auto; }
        .cust-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .cust-item:hover { background: #f1f8e9; }
        .cust-item.active { background: #e8f5e9; border-left: 5px solid var(--primary); font-weight: bold; }

        /* Main Content */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .form-box { background: #fafafa; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
        label { font-size: 0.7rem; font-weight: bold; color: #666; display: block; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; flex: 1; }
        .btn-green { background: var(--primary); }
        .btn-blue { background: var(--secondary); }
        .btn-black { background: #333; }
        
        /* Receipt */
        .receipt { width: 350px; margin: 0 auto; padding: 10px; border: 1px solid #eee; font-size: 10pt; }
        .text-center { text-align: center; }
        .line { border-top: 1px dashed #000; margin: 8px 0; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 5px 0; vertical-align: top; border-bottom: 1px dotted #ccc; }

        @media print {
            .sidebar, .form-box, .print-hide { display: none !important; }
            body { background: white; width: 80mm; display: block; }
            .main-content { padding: 0; width: 80mm; }
            .receipt { width: 72mm; border: none; margin: 0; }
            .sig { display: block !important; margin-top: 30px; text-align: center; border-top: 1px solid #000; width: 150px; margin-left: auto; margin-right: auto; padding-top: 5px; }
        }
        .sig { display: none; }
    </style>
</head>
<body>

<div class="sidebar print-hide">
    <div class="sidebar-header">
        <span>පාරිභෝගිකයින්</span>
        <button onclick="addCustomer()" style="width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; font-weight:bold;">+</button>
    </div>
    <div class="search-area"><input type="text" id="find" placeholder="සොයන්න (Search)..." onkeyup="search()"></div>
    <div class="customer-list" id="list"></div>
</div>

<div class="main-content">
    <div id="setup" class="form-box print-hide">
        <div class="grid">
            <div><label>නම</label><input type="text" id="name"></div>
            <div><label>දුරකථන</label><input type="text" id="phone"></div>
            <div><label>ලිපිනය</label><input type="text" id="city"></div>
        </div>
        <div class="grid">
            <div><label>දිනය</label><input type="date" id="date"></div>
            <div><label>අක්කර</label><input type="number" id="acres" step="0.01"></div>
            <div><label>අක්කරයක මිල</label><input type="number" id="rate"></div>
        </div>
        <div class="grid">
            <div><label>ටෙරල් ගණන</label><input type="number" id="trailers"></div>
            <div><label>ටෙරල් මිල</label><input type="number" id="tprice"></div>
            <div><label>ගෙවූ මුදල්</label><input type="number" id="paid"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-green" onclick="saveProfile()">Profile සුරකින්න</button>
            <button class="btn btn-blue" id="mainBtn" onclick="addEntry()">+ දත්ත ඇතුළත් කරන්න</button>
            <button class="btn btn-black" onclick="window.print()">Print Receipt</button>
        </div>
    </div>

    <div class="receipt" id="bill">
        <div class="text-center">
            <h2 style="margin:0;">අස්වනු නෙලීම්</h2>
            <p style="margin:2px 0; font-size:9pt;">L.B.4 හිගුරක්දමන, හිගුරක්ගොඩ<br>077-2843713</p>
            <div class="line"></div>
        </div>
        <div style="font-size:9pt;">
            <b>නම:</b> <span id="d_name"></span><br>
            <b>ලිපිනය:</b> <span id="d_city"></span><br>
            <b>දිනය:</b> <span id="d_date"></span>
        </div>
        <div class="line"></div>
        <table>
            <thead><tr><th align="left">විස්තරය</th><th align="right">මුදල</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
        <div class="line"></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:11pt;">
            <span>මුළු හිඟය:</span> <span id="total">0.00</span>
        </div>
        <div class="sig">Authorized Signature</div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('Harvest_V6')) || [];
    let activeId = null;
    let editIdx = -1;

    function render() {
        const l = document.getElementById('list');
        l.innerHTML = '';
        db.forEach(c => {
            const d = document.createElement('div');
            d.className = `cust-item ${activeId === c.id ? 'active' : ''}`;
            d.innerHTML = `<div>${c.name}</div><small>${c.city || ''}</small>`;
            d.onclick = () => load(c.id);
            l.appendChild(d);
        });
    }

    function addCustomer() {
        const id = Date.now();
        db.unshift({ id, name: "නව පාරිභෝගිකයා", phone: "", city: "", history: [] });
        save();
        load(id);
    }

    function load(id) {
        activeId = id;
        editIdx = -1;
        const c = db.find(x => x.id === id);
        document.getElementById('name').value = c.name;
        document.getElementById('phone').value = c.phone;
        document.getElementById('city').value = c.city;
        document.getElementById('mainBtn').innerText = "+ දත්ත ඇතුළත් කරන්න";
        document.getElementById('d_date').innerText = new Date().toLocaleDateString();
        showTable();
        render();
    }

    function showTable() {
        const c = db.find(x => x.id === activeId);
        document.getElementById('d_name').innerText = c.name;
        document.getElementById('d_city').innerText = c.city;
        const tb = document.getElementById('rows');
        tb.innerHTML = '';
        let total = 0;

        c.history.forEach((h, i) => {
            let sub = (h.acres * h.rate) + (h.trailers * h.tprice);
            let due = sub - h.paid;
            total += due;
            tb.innerHTML += `<tr>
                <td>${h.date}<br><small>${h.acres}ac, ${h.trailers}T</small></td>
                <td align="right">${sub}<br><small style="color:red">H: ${due}</small><br>
                <button class="print-hide" onclick="editRow(${i})">✎</button>
                <button class="print-hide" onclick="delRow(${i})">×</button></td>
            </tr>`;
        });
        document.getElementById('total').innerText = "Rs. " + total.toLocaleString();
    }

    function addEntry() {
        const h = {
            date: document.getElementById('date').value,
            acres: parseFloat(document.getElementById('acres').value) || 0,
            rate: parseFloat(document.getElementById('rate').value) || 0,
            trailers: parseFloat(document.getElementById('trailers').value) || 0,
            tprice: parseFloat(document.getElementById('tprice').value) || 0,
            paid: parseFloat(document.getElementById('paid').value) || 0
        };
        if(!h.date || !activeId) return alert("Select Customer & Date");
        
        const c = db.find(x => x.id === activeId);
        if(editIdx === -1) c.history.push(h);
        else { c.history[editIdx] = h; editIdx = -1; }
        
        save();
        load(activeId);
        ['date','acres','rate','trailers','tprice','paid'].forEach(i => document.getElementById(i).value = '');
    }

    function editRow(i) {
        const h = db.find(x => x.id === activeId).history[i];
        document.getElementById('date').value = h.date;
        document.getElementById('acres').value = h.acres;
        document.getElementById('rate').value = h.rate;
        document.getElementById('trailers').value = h.trailers;
        document.getElementById('tprice').value = h.tprice;
        document.getElementById('paid').value = h.paid;
        editIdx = i;
        document.getElementById('mainBtn').innerText = "Update Row " + (i+1);
    }

    function delRow(i) { if(confirm("Delete?")) { db.find(x => x.id === activeId).history.splice(i,1); save(); showTable(); } }

    function saveProfile() {
        const c = db.find(x => x.id === activeId);
        c.name = document.getElementById('name').value;
        c.phone = document.getElementById('phone').value;
        c.city = document.getElementById('city').value;
        save();
        render();
        showTable();
        alert("Saved!");
    }

    function save() { localStorage.setItem('Harvest_V6', JSON.stringify(db)); }
    function search() {
        let t = document.getElementById('find').value.toLowerCase();
        document.querySelectorAll('.cust-item').forEach(i => {
            i.style.display = i.innerText.toLowerCase().includes(t) ? 'block' : 'none';
        });
    }
    render();
</script>
</body>
</html>
