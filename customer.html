<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>?????? ?????? - POS Receipt Edition</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #1565c0; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar & Editor (Screen Only) */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; }
        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .customer-item.active { background: #e8f5e9; border-left: 5px solid var(--primary); font-weight: bold; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .edit-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary); color: white; }
        .btn-print { background: #444; color: white; margin-left: 10px; }

        /* Receipt Styles (Screen Preview) */
        .receipt-container { width: 400px; margin: auto; padding: 10px; border: 1px solid #eee; box-shadow: 0 0 10px rgba(0,0,0,0.05); }

        /* --- PRINT STYLES FOR 80MM THERMAL --- */
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body { background: white; margin: 0; padding: 0; width: 80mm; }
            .sidebar, .edit-section, .btn, .print-hide, .summary-box { display: none !important; }
            .main-content { padding: 0; width: 80mm; overflow: visible; }
            .receipt-container { width: 72mm; border: none; box-shadow: none; padding: 2mm; margin: 0; }
            
            h1 { font-size: 18pt !important; margin: 0; }
            p { font-size: 10pt !important; margin: 2px 0; }
            
            table { width: 100%; font-size: 9pt; }
            th { border-bottom: 1px dashed #000 !important; background: none !important; color: #000 !important; padding: 2px; }
            td { padding: 4px 0; border-bottom: 1px dotted #ccc; }
            .total-row { font-size: 11pt !important; border-top: 1px solid #000; }
            
            .sig-section { display: block !important; margin-top: 20px; font-size: 9pt; text-align: center; }
            .sig-line { border-top: 1px solid #000; width: 150px; margin: 30px auto 5px; }
        }

        .header-center { text-align: center; margin-bottom: 15px; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        .receipt-row { display: flex; justify-content: space-between; font-size: 9pt; margin: 2px 0; }
        .summary-box { background: #e3f2fd; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="sidebar print-hide">
    <div class="sidebar-header">
        <span>Customers</span>
        <button onclick="addNewCustomer()" style="background:white; color:green; border:none; border-radius:50%; cursor:pointer; width:30px; height:30px;">+</button>
    </div>
    <div class="customer-list" id="custList"></div>
</div>

<div class="main-content">
    <div id="welcome" style="text-align:center; margin-top:50px; color:#999;">
        <h2>Select Customer for Receipt</h2>
    </div>

    <div id="appBody" style="display:none;">
        <div class="edit-section print-hide">
            <div class="grid-3">
                <div><label>Customer</label><input type="text" id="c_name"></div>
                <div><label>Phone</label><input type="text" id="c_phone"></div>
                <div><label>City</label><input type="text" id="c_city"></div>
            </div>
            <div class="grid-3">
                <div><label>Date</label><input type="date" id="n_date"></div>
                <div><label>Acres</label><input type="number" id="n_acres"></div>
                <div><label>Rate</label><input type="number" id="n_rate"></div>
            </div>
            <div class="grid-3">
                <div><label>Trailers</label><input type="number" id="n_trailers"></div>
                <div><label>T. Price</label><input type="number" id="n_tprice"></div>
                <div><label>Paid</label><input type="number" id="n_paid"></div>
            </div>
            <button class="btn btn-save" onclick="saveAllData()">Save Changes</button>
            <button class="btn btn-print" onclick="window.print()">Print 80mm Receipt</button>
            <button class="btn" onclick="addEntry()" style="background:#0277bd; color:white; margin-left:10px;">+ Add Entry</button>
        </div>

        <div class="summary-box print-hide">
            <div>Acres: <span id="stat_acres">0</span></div>
            <div>Trailers: <span id="stat_trailers">0</span></div>
            <div>Due: <strong id="stat_due">0</strong></div>
        </div>

        <div class="receipt-container">
            <div class="header-center">
                <h1 style="color:var(--primary); margin:0;">?????? ??????</h1>
                <p>L.B.4 ??????????, ??????????</p>
                <p>Hotline: 077-2843713</p>
                <div class="divider"></div>
                <p id="billDate"></p>
            </div>

            <div class="receipt-row"><strong>To:</strong> <span id="disp_name"></span></div>
            <div class="receipt-row"><strong>Phone:</strong> <span id="disp_phone"></span></div>
            <div class="divider"></div>

            <table id="receiptTable">
                <thead>
                    <tr>
                        <th>Details</th>
                        <th style="text-align:right;">Total</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="divider"></div>
            <div class="receipt-row" style="font-size:12pt; font-weight:bold;">
                <span>NET DUE:</span>
                <span id="grandTotal">0.00</span>
            </div>
            <div class="divider"></div>

            <div class="sig-section" style="text-align:center; font-size:8pt;">
                <p>Thank you for choosing our service!</p>
                <div class="sig-line"></div>
                <p>Authorized Signature</p>
            </div>
        </div>
    </div>
</div>

<script>
    let customers = JSON.parse(localStorage.getItem('HarvestPOS_DB')) || [];
    let activeId = null;

    function renderList() {
        const list = document.getElementById('custList');
        list.innerHTML = '';
        customers.forEach(c => {
            const div = document.createElement('div');
            div.className = `customer-item ${activeId === c.id ? 'active' : ''}`;
            div.innerHTML = `<div>${c.name}</div><small>${c.city}</small>`;
            div.onclick = () => loadCustomer(c.id);
            list.appendChild(div);
        });
    }

    function addNewCustomer() {
        const newId = Date.now();
        customers.unshift({ id: newId, name: "New Customer", phone: "", city: "", history: [] });
        loadCustomer(newId);
    }

    function loadCustomer(id) {
        activeId = id;
        const c = customers.find(cust => cust.id === id);
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('appBody').style.display = 'block';
        document.getElementById('billDate').innerText = "Date: " + new Date().toLocaleDateString();
        
        document.getElementById('c_name').value = c.name;
        document.getElementById('c_phone').value = c.phone;
        document.getElementById('c_city').value = c.city;
        document.getElementById('disp_name').innerText = c.name;
        document.getElementById('disp_phone').innerText = c.phone;

        renderTable();
        renderList();
    }

    function renderTable() {
        const c = customers.find(cust => cust.id === activeId);
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        let totalDue = 0; let totalAcres = 0; let totalTrailers = 0;

        c.history.forEach((h, idx) => {
            let hCost = (h.acres || 0) * (h.rate || 0);
            let tCost = (h.trailers || 0) * (h.tprice || 0);
            let dayTotal = hCost + tCost;
            let dayDue = dayTotal - (h.paid || 0);
            totalDue += dayDue;
            totalAcres += (h.acres || 0);
            totalTrailers += (h.trailers || 0);

            body.innerHTML += `
                <tr>
                    <td>
                        <strong>${h.date}</strong><br>
                        ${h.acres} ac @ ${h.rate}<br>
                        ${h.trailers} T @ ${h.tprice}<br>
                        <small>Paid: ${h.paid}</small>
                    </td>
                    <td style="text-align:right; vertical-align:bottom;">
                        ${dayTotal.toLocaleString()}<br>
                        <span style="color:red; font-weight:bold;">Due: ${dayDue.toLocaleString()}</span>
                    </td>
                </tr>`;
        });
        document.getElementById('grandTotal').innerText = "Rs. " + totalDue.toLocaleString();
        document.getElementById('stat_acres').innerText = totalAcres;
        document.getElementById('stat_trailers').innerText = totalTrailers;
        document.getElementById('stat_due').innerText = totalDue.toLocaleString();
    }

    function addEntry() {
        const h = {
            date: document.getElementById('n_date').value,
            acres: parseFloat(document.getElementById('n_acres').value) || 0,
            rate: parseFloat(document.getElementById('n_rate').value) || 0,
            trailers: parseFloat(document.getElementById('n_trailers').value) || 0,
            tprice: parseFloat(document.getElementById('n_tprice').value) || 0,
            paid: parseFloat(document.getElementById('n_paid').value) || 0
        };
        if(!h.date) return alert("Select Date");
        customers.find(c => c.id === activeId).history.push(h);
        renderTable();
    }

    function saveAllData() {
        const c = customers.find(cust => cust.id === activeId);
        c.name = document.getElementById('c_name').value;
        c.phone = document.getElementById('c_phone').value;
        c.city = document.getElementById('c_city').value;
        localStorage.setItem('HarvestPOS_DB', JSON.stringify(customers));
        loadCustomer(activeId);
        alert("Saved!");
    }

    renderList();
</script>

</body>
</html>
